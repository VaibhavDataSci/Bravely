name: Backend CI

on:
  push:
    branches:
      - main
      - thulasi-v1
      - vaibhav
      - feature/backend-auth

  pull_request:
    branches:
      - main

jobs:
  backend-checks:
    name: Backend Checks (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint --if-present

      - name: Run tests
        run: npm test --if-present

      - name: Build app
        run: npm run build --if-present

  smoke-test:
    name: Server Test
    needs: backend-checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Starting server
        run: |
          npm start &
      
      - name: Waiting for server
        run: |
          for i in {1..20}; do
            curl -s http://localhost:5000/health && break
            sleep 2
          done

      - name: Verify health endpoint
        run: curl --fail http://localhost:5000/health